<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katani Quarry — Approvals</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff;
    --panel:#f6f6f8;
    --panel-alt:#eeeef1;
    --panel-raise:#ffffff;
    --line:#e2e2e6;
    --line-soft:#ececf0;
    --text:#151517;
    --text-dim:#68686f;
    --text-faint:#9a9aa2;
    --oxide:#f5590a;
    --amber:#b45309;
    --red:#e13a3a;
    --green:#f5590a;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:#ffffff;}
  html,body{
    color:var(--text);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:'IBM Plex Mono',monospace;}
  h1,h2,h3{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:0.04em;margin:0;}

  .app-shell{
    max-width:480px;margin:0 auto;min-height:100vh;
    background:var(--bg);position:relative;
    border-left:1px solid var(--line);border-right:1px solid var(--line);
    padding-bottom:30px;
  }
  @media(max-width:520px){ .app-shell{border-left:none;border-right:none;} }

  /* Header */
  .mobile-header{
    display:flex;align-items:center;gap:12px;
    padding:16px;border-bottom:1px solid var(--line);
    position:sticky;top:0;background:var(--bg);z-index:20;
  }
  .back-btn{
    width:34px;height:34px;border-radius:9px;background:var(--panel);
    border:1px solid var(--line);color:var(--text-dim);
    display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;
  }
  .back-btn svg{width:16px;height:16px;}
  .mh-title{flex:1;}
  .mh-title h1{font-size:15px;color:var(--text);}
  .mh-title .sub{font-size:10.5px;color:var(--text-faint);letter-spacing:0.1em;margin-top:2px;}
  .mh-brand-logo{height:14px;width:auto;display:block;margin-top:4px;}
  .mh-count{
    background:var(--oxide);color:#fff;font-size:11px;font-weight:700;
    min-width:22px;height:22px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-family:'IBM Plex Mono',monospace;flex-shrink:0;
  }

  .wrap{padding:16px;}

  /* Summary strip */
  .summary-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
  .summary-card{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:12px;text-align:center;}
  .summary-card .sc-val{font-family:'IBM Plex Mono',monospace;font-size:19px;font-weight:600;}
  .summary-card .sc-val.red{color:var(--red);}
  .summary-card .sc-val.blue{color:var(--oxide);}
  .summary-card .sc-val.dim{color:var(--text);}
  .summary-card .sc-label{font-size:9.5px;letter-spacing:0.08em;color:var(--text-faint);font-family:'Oswald',sans-serif;margin-top:4px;}

  /* Filters */
  .filter-row{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;}
  .fchip{
    padding:8px 13px;border:1px solid var(--line);border-radius:100px;
    font-size:11.5px;color:var(--text-dim);background:var(--panel);
    cursor:pointer;white-space:nowrap;font-family:'Inter',sans-serif;flex-shrink:0;
  }
  .fchip.active{background:var(--oxide);border-color:var(--oxide);color:#fff;font-weight:600;}

  /* Approval cards */
  .approval-card{
    background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:14px;margin-bottom:10px;
  }
  .approval-card.crit{border-color:rgba(225,58,58,0.35);}
  .ac-top{display:flex;align-items:flex-start;gap:11px;margin-bottom:10px;}
  .ac-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .ac-icon svg{width:17px;height:17px;}
  .ac-icon.red{background:rgba(225,58,58,0.16);color:var(--red);}
  .ac-icon.blue{background:rgba(245,89,10,0.16);color:var(--oxide);}
  .ac-icon.amber{background:rgba(180,83,9,0.12);color:var(--amber);}
  .ac-body{flex:1;min-width:0;}
  .ac-type{font-size:9.5px;letter-spacing:0.09em;color:var(--text-faint);font-family:'Oswald',sans-serif;margin-bottom:3px;}
  .ac-title{font-size:13.5px;font-weight:600;color:var(--text);line-height:1.3;}
  .ac-meta{font-size:11px;color:var(--text-faint);margin-top:6px;}
  .ac-detail{
    background:var(--panel-alt);border:1px solid var(--line-soft);border-radius:8px;
    padding:9px 11px;font-size:11.5px;color:var(--text-dim);margin-bottom:12px;line-height:1.5;
  }
  .ac-detail b{color:var(--text);font-weight:600;}
  .ac-actions{display:flex;gap:8px;}
  .ac-btn{
    flex:1;padding:10px;border-radius:8px;border:1px solid var(--line);
    font-family:'Oswald',sans-serif;font-size:11.5px;letter-spacing:0.05em;
    text-transform:uppercase;font-weight:600;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:6px;
  }
  .ac-btn svg{width:14px;height:14px;}
  .ac-btn.approve{background:var(--oxide);border-color:var(--oxide);color:#fff;}
  .ac-btn.approve:hover{background:#ff7a2e;}
  .ac-btn.reject{background:transparent;color:var(--red);border-color:rgba(225,58,58,0.4);}
  .ac-btn.reject:hover{background:rgba(225,58,58,0.1);}

  .resolved-badge{
    display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:100px;
    font-size:10px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;
    font-family:'Oswald',sans-serif;
  }
  .resolved-badge.approved{color:var(--oxide);background:rgba(245,89,10,0.14);}
  .resolved-badge.rejected{color:var(--red);background:rgba(225,58,58,0.14);}

  .section-label{
    font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:0.1em;
    color:var(--text-faint);margin:22px 0 10px;
  }

  .empty-state{
    display:flex;flex-direction:column;align-items:center;text-align:center;
    padding:50px 24px;color:var(--text-dim);
  }
  .empty-state .e-icon{
    width:52px;height:52px;border-radius:14px;background:var(--panel);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;margin-bottom:14px;color:var(--oxide);
  }
  .empty-state .e-icon svg{width:24px;height:24px;}
  .empty-state h3{font-family:'Inter',sans-serif;text-transform:none;font-size:14px;color:var(--text);margin-bottom:5px;}
  .empty-state p{font-size:11.5px;color:var(--text-faint);max-width:230px;line-height:1.5;}

  button:focus-visible{outline:2px solid var(--oxide);outline-offset:2px;}

  .admin-btn{
    padding:7px 11px;font-size:11px;font-weight:700;border-radius:9px;
    border:1px solid var(--line);background:#fff;color:var(--text);
    cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:'Inter',sans-serif;
  }
  .admin-btn.on{background:var(--oxide);border-color:var(--oxide);color:#fff;}

  .overlay{
    position:fixed;inset:0;background:rgba(0,0,0,0.45);
    display:none;align-items:center;justify-content:center;z-index:100;padding:16px;
  }
  .overlay.open{display:flex;}
  .modal{
    background:#fff;border-radius:14px;padding:20px;width:100%;max-width:360px;
    border:1px solid var(--line);
  }
  .modal h3{font-size:14px;margin-bottom:14px;}
  .modal .field{margin-bottom:12px;}
  .modal .field label{display:block;font-size:11px;color:var(--text-dim);margin-bottom:5px;font-family:'Inter',sans-serif;}
  .modal .field input{
    width:100%;padding:10px 11px;border-radius:8px;border:1px solid var(--line);
    font-size:13px;font-family:'Inter',sans-serif;
  }
  .modal-actions{display:flex;gap:8px;margin-top:6px;}
  .modal-actions button{
    flex:1;padding:10px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;
    font-family:'Oswald',sans-serif;letter-spacing:0.04em;text-transform:uppercase;
  }
  .btn-cancel{background:var(--panel);border:1px solid var(--line);color:var(--text-dim);}
  .btn-submit{background:var(--oxide);border:1px solid var(--oxide);color:#fff;}

  .ac-btn[disabled]{opacity:0.5;cursor:not-allowed;}
  .load-state{padding:40px 24px;text-align:center;color:var(--text-faint);font-size:12px;}
</style>
</head>
<body>

<div class="app-shell">

  <div class="mobile-header">
    <button class="back-btn" onclick="history.back()" aria-label="Back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
    <div class="mh-title">
      <h1>Approvals</h1>
    </div>
    <div class="mh-count" id="pendingCount">0</div>
    <button class="admin-btn" id="adminBtn" onclick="onAdminBtnClick()">Admin</button>
  </div>

  <div class="wrap">

    <div class="summary-row">
      <div class="summary-card">
        <div class="sc-val red" id="sumPending">0</div>
        <div class="sc-label">PENDING</div>
      </div>
      <div class="summary-card">
        <div class="sc-val blue" id="sumApproved">0</div>
        <div class="sc-label">APPROVED</div>
      </div>
      <div class="summary-card">
        <div class="sc-val dim" id="sumRejected">0</div>
        <div class="sc-label">REJECTED</div>
      </div>
    </div>

    <div class="filter-row">
      <button class="fchip active" data-filter="all">All</button>
      <button class="fchip" data-filter="discrepancy">Discrepancies</button>
      <button class="fchip" data-filter="new-item">New Items</button>
      <button class="fchip" data-filter="threshold">Threshold Changes</button>
    </div>

    <div id="pendingList"></div>
    <div id="resolvedWrap"></div>

  </div>
</div>

<!-- ADMIN LOGIN MODAL -->
<div class="overlay" id="adminOverlay">
  <div class="modal">
    <h3>Admin Login</h3>
    <div class="field">
      <label>Email</label>
      <input type="email" id="adminEmail" placeholder="you@cabrocity.co.ke">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="adminPassword" placeholder="••••••••">
    </div>
    <div id="adminError" style="display:none;color:var(--red);font-size:12.5px;margin:-4px 0 10px;"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeAdminModal()">Cancel</button>
      <button class="btn-submit" onclick="submitAdminLogin()">Log In</button>
    </div>
  </div>
</div>

<script type="module">
/* ---------- Firebase ---------- */
import {
  db, auth, loginAdmin, logoutAdmin, watchAdmin, statusOf,
  collection, doc, addDoc, updateDoc, getDoc, onSnapshot,
  serverTimestamp, query, orderBy
} from "./firebase-config.js";

const ICONS = {
  warn:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><path d="M12 9v4M12 17h.01"/></svg>`,
  box:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8l-9-5-9 5 9 5 9-5z"/><path d="M3 8v8l9 5 9-5V8"/><path d="M12 13v3"/></svg>`,
  sliders:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>`,
  check:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>`,
  x:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>`,
  empty:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg>`
};

/* ---------- Admin auth (same pattern as index.html / stock-list.html) ---------- */
let isAdmin = false, currentAdminEmail = "";
watchAdmin((user)=>{
  isAdmin = !!user;
  currentAdminEmail = user ? user.email : "";
  const btn = document.getElementById("adminBtn");
  btn.textContent = isAdmin ? "Admin: " + currentAdminEmail.split("@")[0] : "Admin";
  btn.classList.toggle("on", isAdmin);
  render();
});
window.onAdminBtnClick = function(){
  if(isAdmin){ if(confirm("Log out of admin mode?")) logoutAdmin(); }
  else openAdminModal();
};
function openAdminModal(){
  document.getElementById("adminError").style.display = "none";
  document.getElementById("adminOverlay").classList.add("open");
}
window.closeAdminModal = function(){ document.getElementById("adminOverlay").classList.remove("open"); };
window.submitAdminLogin = function(){
  const email = document.getElementById("adminEmail").value.trim();
  const password = document.getElementById("adminPassword").value;
  loginAdmin(email, password).then(closeAdminModal).catch(()=>{
    const e = document.getElementById("adminError");
    e.textContent = "Login failed — check email and password.";
    e.style.display = "block";
  });
};
function requireAdmin(){
  if(isAdmin) return true;
  openAdminModal();
  return false;
}
document.getElementById("adminOverlay").addEventListener("click", (e)=>{ if(e.target.id==="adminOverlay") closeAdminModal(); });

/* ---------- Live approvals data (mirrors the "approvals" Firestore collection) ---------- */
let approvals = [];
let activeFilter = "all";
let loaded = false;

onSnapshot(query(collection(db, "approvals"), orderBy("createdAt", "desc")), (snap)=>{
  approvals = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  loaded = true;
  render();
}, (err)=>{
  console.error("approvals listener failed:", err);
  loaded = true;
  document.getElementById("pendingList").innerHTML =
    `<div class="load-state">Couldn't load approvals. Check your connection and try again.</div>`;
});

const iconFor = t => t==="discrepancy" ? "warn" : t==="new-item" ? "box" : "sliders";
const colorFor = t => t==="discrepancy" ? "red" : t==="new-item" ? "blue" : "amber";
const labelFor = t => t==="discrepancy" ? "STOCK DISCREPANCY" : t==="new-item" ? "NEW ITEM REQUEST" : "THRESHOLD CHANGE";

function escapeHtml(str){
  return String(str ?? "").replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[c]));
}

function timeAgo(ts){
  if(!ts || !ts.toDate) return "";
  const d = ts.toDate();
  const diffMs = Date.now() - d.getTime();
  const mins = Math.floor(diffMs / 60000);
  if(mins < 1) return "Just now";
  if(mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if(hrs < 24) return `Today · ${d.toLocaleTimeString([], {hour:'numeric', minute:'2-digit'})}`;
  const days = Math.floor(hrs / 24);
  if(days === 1) return "Yesterday";
  return `${days} days ago`;
}

// Builds the escaped detail line for a card from structured fields —
// never stores or injects raw HTML from a requester.
function detailFor(a){
  const item = `<b>${escapeHtml(a.itemName || "Unnamed item")}</b>`;
  if(a.type === "discrepancy"){
    return `Physical count came to <b>${escapeHtml(a.actualCount)} ${escapeHtml(a.uom||"")}</b>, system recorded <b>${escapeHtml(a.systemCount)} ${escapeHtml(a.uom||"")}</b> for ${item}. Approving corrects the balance to the physical count.`;
  }
  if(a.type === "new-item"){
    return `Requesting to add ${item} (${escapeHtml(a.category||"—")}, unit: ${escapeHtml(a.uom||"—")}) to the register with a starting balance of <b>${escapeHtml(a.startBalance ?? 0)}</b> and minimum threshold of <b>${escapeHtml(a.minThreshold ?? 0)}</b>.`;
  }
  if(a.type === "threshold"){
    return `Requesting to change the reorder minimum for ${item} from <b>${escapeHtml(a.oldMin)}</b> to <b>${escapeHtml(a.newMin)}</b>.`;
  }
  return "";
}

function render(){
  if(!loaded){
    document.getElementById("pendingList").innerHTML = `<div class="load-state">Loading approvals…</div>`;
    return;
  }

  const pending = approvals.filter(a=>a.status==="pending");
  const resolved = approvals.filter(a=>a.status!=="pending");
  const approvedCount = approvals.filter(a=>a.status==="approved").length;
  const rejectedCount = approvals.filter(a=>a.status==="rejected").length;

  document.getElementById("pendingCount").textContent = pending.length;
  document.getElementById("sumPending").textContent = pending.length;
  document.getElementById("sumApproved").textContent = approvedCount;
  document.getElementById("sumRejected").textContent = rejectedCount;

  const shownPending = pending.filter(a=> activeFilter==="all" || a.type===activeFilter);
  const disabledAttr = isAdmin ? "" : "disabled";

  document.getElementById("pendingList").innerHTML = shownPending.length
    ? shownPending.map(a=>`
      <div class="approval-card ${a.type==='discrepancy'?'crit':''}">
        <div class="ac-top">
          <div class="ac-icon ${colorFor(a.type)}">${ICONS[iconFor(a.type)]}</div>
          <div class="ac-body">
            <div class="ac-type">${labelFor(a.type)}</div>
            <div class="ac-title">${escapeHtml(a.title)}</div>
            <div class="ac-meta">${escapeHtml(a.requestedBy)} · ${timeAgo(a.createdAt)}</div>
          </div>
        </div>
        <div class="ac-detail">${detailFor(a)}</div>
        <div class="ac-actions">
          <button class="ac-btn reject" ${disabledAttr} onclick="resolveApproval('${a.id}','rejected')">${ICONS.x} Reject</button>
          <button class="ac-btn approve" ${disabledAttr} onclick="resolveApproval('${a.id}','approved')">${ICONS.check} Approve</button>
        </div>
      </div>
    `).join("")
    : `<div class="empty-state">
        <div class="e-icon">${ICONS.empty}</div>
        <h3>Nothing pending</h3>
        <p>${activeFilter==="all" ? "All approval requests are cleared." : "No requests in this category right now."}</p>
      </div>`;

  document.getElementById("resolvedWrap").innerHTML = resolved.length
    ? `<div class="section-label">RECENTLY ACTIONED</div>` + resolved.slice(0,6).map(a=>`
      <div class="approval-card" style="opacity:0.7;">
        <div class="ac-top" style="margin-bottom:0;">
          <div class="ac-icon ${colorFor(a.type)}">${ICONS[iconFor(a.type)]}</div>
          <div class="ac-body">
            <div class="ac-type">${labelFor(a.type)}</div>
            <div class="ac-title">${escapeHtml(a.title)}</div>
            <div class="ac-meta">${escapeHtml(a.requestedBy)} · ${timeAgo(a.createdAt)}</div>
          </div>
          <span class="resolved-badge ${a.status}">${a.status}</span>
        </div>
      </div>
    `).join("")
    : "";
}

// Approving/rejecting is admin-only (enforced client-side here AND by
// Firestore rules, which is what actually matters). Approving a request
// also applies its effect to stockItems in the same step.
window.resolveApproval = async function(id, status){
  if(!requireAdmin()) return;
  const a = approvals.find(x=>x.id===id);
  if(!a) return;

  try{
    if(status === "approved"){
      if(a.type === "new-item"){
        await addDoc(collection(db, "stockItems"), {
          name: a.itemName,
          category: a.category || "",
          uom: a.uom || "",
          balance: a.startBalance || 0,
          min: a.minThreshold || 0,
          status: statusOf(a.startBalance || 0, a.minThreshold || 0)
        });
      } else if(a.type === "discrepancy" && a.itemId){
        const itemSnap = await getDoc(doc(db, "stockItems", a.itemId));
        const min = itemSnap.exists() ? (itemSnap.data().min || 0) : 0;
        await updateDoc(doc(db, "stockItems", a.itemId), {
          balance: a.actualCount,
          status: statusOf(a.actualCount, min)
        });
      } else if(a.type === "threshold" && a.itemId){
        const itemSnap = await getDoc(doc(db, "stockItems", a.itemId));
        const balance = itemSnap.exists() ? (itemSnap.data().balance || 0) : 0;
        await updateDoc(doc(db, "stockItems", a.itemId), {
          min: a.newMin,
          status: statusOf(balance, a.newMin)
        });
      }
    }

    await updateDoc(doc(db, "approvals", id), {
      status,
      resolvedAt: serverTimestamp(),
      resolvedBy: currentAdminEmail || "admin"
    });
  } catch(err){
    console.error("Failed to resolve approval:", err);
    alert("Something went wrong resolving this request. Please try again.");
  }
};

document.querySelectorAll(".fchip").forEach(chip=>{
  chip.addEventListener("click", ()=>{
    document.querySelectorAll(".fchip").forEach(c=>c.classList.remove("active"));
    chip.classList.add("active");
    activeFilter = chip.dataset.filter;
    render();
  });
});

render();
</script>

</body>
</html>
