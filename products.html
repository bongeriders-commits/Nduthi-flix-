<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cabro POS — Products</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0e0e10">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="icon" href="/icon-192.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff; --panel:#f6f6f8; --panel-alt:#eeeef1; --panel-raise:#ffffff;
    --line:#e2e2e6; --line-soft:#ececf0; --text:#151517; --text-dim:#68686f; --text-faint:#9a9aa2;
    --oxide:#f5590a; --oxide-dim:#b8420a; --red:#e13a3a; --radius:10px;
  }
  *{box-sizing:border-box;}
  body{margin:0;}
  html,body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  h1,h2,h3,.disp{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:0.04em;margin:0;}

  .topbar{
    display:flex;align-items:center;justify-content:space-between;padding:12px 16px;
    border-bottom:1px solid var(--line);background:linear-gradient(180deg,#0e0e10,#0a0a0b);
    position:sticky;top:0;z-index:30;gap:10px;
  }
  .brand{display:flex;align-items:center;gap:10px;min-width:0;}
  .brand-mark{width:30px;height:30px;border:2px solid var(--oxide);border-radius:4px;display:flex;align-items:center;justify-content:center;color:var(--oxide);font-family:'Oswald',sans-serif;font-weight:700;font-size:13px;transform:rotate(45deg);flex-shrink:0;}
  .brand-mark span{transform:rotate(-45deg);}
  .brand-text h1{font-size:15px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .brand-text .sub{font-size:10px;color:#8a8a92;letter-spacing:0.08em;margin-top:1px;}
  .icon-btn{width:34px;height:34px;border-radius:8px;border:1px solid #26262a;background:#151517;color:#c9c9ce;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .icon-btn svg{width:17px;height:17px;}
  .topbar-right{display:flex;gap:8px;}

  .tabs{display:flex;gap:2px;background:#0a0a0b;padding:0 12px;overflow-x:auto;}
  .tab-link{padding:11px 14px;font-size:12px;letter-spacing:0.04em;color:#8a8a92;text-decoration:none;white-space:nowrap;border-bottom:2px solid transparent;font-weight:600;}
  .tab-link.active{color:var(--oxide);border-bottom-color:var(--oxide);}

  .wrap{padding:14px 14px 40px;max-width:720px;margin:0 auto;}

  .add-card{border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:18px;background:var(--panel-raise);}
  .add-card h3{font-size:13px;margin-bottom:12px;}
  .field-row{display:flex;gap:10px;}
  .field{flex:1;margin-bottom:10px;}
  .field label{display:block;font-size:11px;color:var(--text-dim);margin-bottom:5px;font-weight:600;}
  .field input{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;font-size:13.5px;outline:none;font-family:'Inter',sans-serif;}
  .field input:focus{border-color:var(--oxide);}
  .field input.mono{font-family:'IBM Plex Mono',monospace;}
  .btn-primary{padding:11px 18px;border-radius:9px;border:none;background:var(--oxide);color:#fff;font-weight:700;font-size:13px;cursor:pointer;width:100%;}
  .err-box{color:var(--red);font-size:12px;margin-bottom:10px;display:none;}

  .prod-row{
    display:flex;align-items:center;gap:10px;padding:12px;border:1px solid var(--line);
    border-radius:9px;margin-bottom:8px;background:var(--panel-raise);
  }
  .prod-row.inactive{opacity:0.5;}
  .pr-info{flex:1;min-width:0;}
  .pr-name{font-size:13.5px;font-weight:600;}
  .pr-meta{font-size:11.5px;color:var(--text-faint);margin-top:2px;}
  .pr-price{font-family:'IBM Plex Mono',monospace;font-size:13.5px;font-weight:600;color:var(--oxide-dim);flex-shrink:0;width:80px;text-align:right;}
  .pr-actions{display:flex;gap:6px;flex-shrink:0;}
  .pr-actions button{border:1px solid var(--line);background:none;font-size:11px;padding:6px 9px;border-radius:6px;cursor:pointer;color:var(--text-dim);}
  .pr-actions button.danger{color:var(--red);}

  .section-label{font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-faint);margin:18px 0 8px;}
  .empty{padding:40px 16px;text-align:center;color:var(--text-dim);font-size:13px;}
  #gate{position:fixed;inset:0;background:#fff;z-index:100;display:flex;align-items:center;justify-content:center;}
  #gate .g{text-align:center;color:var(--text-dim);font-size:13px;}
</style>
</head>
<body>

<div id="gate"><div class="g">Loading…</div></div>

<div class="topbar">
  <div class="brand">
    <div class="brand-mark"><span>C</span></div>
    <div class="brand-text"><h1>Cabro POS</h1><div class="sub">Products</div></div>
  </div>
  <div class="topbar-right">
    <button class="icon-btn" title="Terminal" onclick="location.href='index.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6" transform="rotate(180 12 12)"/></svg>
    </button>
  </div>
</div>
<div class="tabs">
  <a class="tab-link" href="index.html">Terminal</a>
  <a class="tab-link" href="sales.html">Sales History</a>
  <a class="tab-link active" href="products.html">Products</a>
</div>

<div class="wrap">
  <div class="add-card">
    <h3 id="formTitle">Add Product</h3>
    <div class="err-box" id="errBox"></div>
    <div class="field">
      <label>Name</label>
      <input type="text" id="pName" placeholder="e.g. Soda 500ml">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Price (KES)</label>
        <input type="number" id="pPrice" class="mono" placeholder="0">
      </div>
      <div class="field">
        <label>Category (optional)</label>
        <input type="text" id="pCategory" placeholder="e.g. Drinks">
      </div>
    </div>
    <button class="btn-primary" onclick="submitProduct()" id="submitBtn">+ Add Product</button>
    <button class="btn-primary" style="background:none;color:var(--text-dim);border:1px solid var(--line);margin-top:8px;display:none;" id="cancelEditBtn" onclick="cancelEdit()">Cancel Edit</button>
  </div>

  <div class="section-label">Catalogue</div>
  <div id="productList"><div class="empty">Loading products…</div></div>
</div>

<script type="module">
import {
  db, watchAdmin, fetchOrBootstrapRole, canAccessPOS, canManage,
  collection, addDoc, updateDoc, doc, onSnapshot, serverTimestamp, query, orderBy, logAudit
} from "../firebase-config.js";

let myUid = "", myName = "", myRole = "";
let products = [];
let editingId = null;

function escapeHtml(str){
  if(str === null || str === undefined) return "";
  return String(str).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function money(n){
  const v = Math.round((n||0)*100)/100;
  return "KES " + v.toLocaleString("en-KE", { minimumFractionDigits: v % 1 === 0 ? 0 : 2 });
}

watchAdmin(async (user)=>{
  if(!user){ window.location.replace("../index.html"); return; }
  let roleDoc;
  try{ roleDoc = await fetchOrBootstrapRole(user); }
  catch(e){ roleDoc = null; }
  if(!roleDoc || !canAccessPOS(roleDoc.role, roleDoc.posAccess)){ window.location.replace("../index.html"); return; }
  if(!canManage(roleDoc.role)){
    // Cashiers can use the terminal but only owner/admin manage the catalogue.
    window.location.replace("index.html");
    return;
  }
  myUid = user.uid; myName = roleDoc.displayName || user.email; myRole = roleDoc.role;
  document.getElementById("gate").style.display = "none";
  startListener();
});

function startListener(){
  const q = query(collection(db, "posProducts"), orderBy("name"));
  onSnapshot(q, (snap)=>{
    products = snap.docs.map(d=>({id:d.id, ...d.data()}));
    renderList();
  }, (err)=>{
    document.getElementById("productList").innerHTML = `<div class="empty">Couldn't load products — ${escapeHtml(err.message)}</div>`;
  });
}
function renderList(){
  const box = document.getElementById("productList");
  if(products.length === 0){ box.innerHTML = `<div class="empty">No products yet — add your first one above.</div>`; return; }
  box.innerHTML = products.map(p=>`
    <div class="prod-row ${p.active===false ? "inactive" : ""}">
      <div class="pr-info">
        <div class="pr-name">${escapeHtml(p.name)}</div>
        <div class="pr-meta">${p.category ? escapeHtml(p.category) : "Uncategorised"}${p.active===false ? " · Inactive" : ""}</div>
      </div>
      <div class="pr-price">${money(p.price)}</div>
      <div class="pr-actions">
        <button onclick="editProduct('${p.id}')">Edit</button>
        <button class="${p.active===false?"":"danger"}" onclick="toggleActive('${p.id}', ${p.active===false})">${p.active===false?"Activate":"Deactivate"}</button>
      </div>
    </div>
  `).join("");
}
window.editProduct = function(id){
  const p = products.find(x=>x.id===id);
  if(!p) return;
  editingId = id;
  document.getElementById("pName").value = p.name || "";
  document.getElementById("pPrice").value = p.price || "";
  document.getElementById("pCategory").value = p.category || "";
  document.getElementById("formTitle").textContent = "Edit Product";
  document.getElementById("submitBtn").textContent = "Save Changes";
  document.getElementById("cancelEditBtn").style.display = "block";
  window.scrollTo({top:0, behavior:"smooth"});
};
window.cancelEdit = function(){
  editingId = null;
  document.getElementById("pName").value = "";
  document.getElementById("pPrice").value = "";
  document.getElementById("pCategory").value = "";
  document.getElementById("formTitle").textContent = "Add Product";
  document.getElementById("submitBtn").textContent = "+ Add Product";
  document.getElementById("cancelEditBtn").style.display = "none";
};
window.toggleActive = async function(id, makeActive){
  try{
    await updateDoc(doc(db, "posProducts", id), { active: makeActive });
    logAudit({
      actorUid: myUid, actorName: myName, actorRole: myRole,
      action: makeActive ? "pos.product_activate" : "pos.product_deactivate",
      entityType: "posProduct", entityId: id,
      summary: `${makeActive ? "Activated" : "Deactivated"} POS product`
    });
  }catch(e){ alert("Couldn't update product: " + e.message); }
};
window.submitProduct = async function(){
  const errBox = document.getElementById("errBox");
  errBox.style.display = "none";
  const name = document.getElementById("pName").value.trim();
  const price = parseFloat(document.getElementById("pPrice").value);
  const category = document.getElementById("pCategory").value.trim();
  if(!name){ errBox.textContent = "Enter a product name."; errBox.style.display = "block"; return; }
  if(isNaN(price) || price < 0){ errBox.textContent = "Enter a valid price."; errBox.style.display = "block"; return; }
  try{
    if(editingId){
      await updateDoc(doc(db, "posProducts", editingId), { name, price, category });
      logAudit({
        actorUid: myUid, actorName: myName, actorRole: myRole,
        action: "pos.product_edit", entityType: "posProduct", entityId: editingId, entityLabel: name,
        summary: `Edited POS product "${name}"`
      });
    } else {
      const ref = await addDoc(collection(db, "posProducts"), {
        name, price, category, active: true, createdAt: serverTimestamp(), createdBy: myUid
      });
      logAudit({
        actorUid: myUid, actorName: myName, actorRole: myRole,
        action: "pos.product_add", entityType: "posProduct", entityId: ref.id, entityLabel: name,
        summary: `Added POS product "${name}" at ${money(price)}`
      });
    }
    cancelEdit();
  }catch(e){
    errBox.textContent = "Couldn't save product: " + e.message;
    errBox.style.display = "block";
  }
};
</script>
</body>
</html>
