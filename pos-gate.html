<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choose App — Cabro City</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#f5590a">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="icon" href="/icon-192.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff; --panel:#f6f6f8; --panel-raise:#ffffff;
    --line:#e2e2e6; --text:#151517; --text-dim:#68686f; --text-faint:#9a9aa2;
    --oxide:#f5590a; --oxide-dim:#b8420a; --radius:10px;
  }
  *{box-sizing:border-box;}
  body{margin:0;}
  html,body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
  h1,h2,.disp{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.04em;margin:0;}

  #wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .card{width:100%;max-width:420px;text-align:center;}
  .card img{height:34px;width:auto;margin:0 auto 20px;display:block;}
  .card h2{font-family:'Inter',sans-serif;text-transform:none;font-size:17px;font-weight:700;margin-bottom:6px;}
  .card p{font-size:12.5px;color:var(--text-dim);line-height:1.5;margin-bottom:24px;}

  .mode-list{display:flex;flex-direction:column;gap:12px;text-align:left;}
  .mode-item{
    display:flex;align-items:center;gap:14px;
    padding:18px 16px;border:1px solid var(--line);border-radius:var(--radius);
    background:var(--panel-raise);cursor:pointer;transition:border-color .15s,background .15s;
  }
  .mode-item:active{background:var(--panel);}
  .mode-icon{
    width:44px;height:44px;flex-shrink:0;border-radius:10px;
    background:var(--oxide);color:#fff;display:flex;align-items:center;justify-content:center;
  }
  .mode-icon svg{width:22px;height:22px;}
  .mode-info{flex:1;min-width:0;}
  .mode-name{font-size:14.5px;font-weight:700;color:var(--text);}
  .mode-sub{font-size:11.5px;color:var(--text-faint);margin-top:2px;}
  .mode-arrow{color:var(--text-faint);flex-shrink:0;}
  .mode-arrow svg{width:18px;height:18px;}

  .loading{font-size:12.5px;color:var(--text-dim);padding:20px 0;}

  .logout-link{
    margin-top:22px;font-size:12px;color:var(--text-dim);text-decoration:underline;
    background:none;border:none;cursor:pointer;font-family:'Inter',sans-serif;
  }
</style>
</head>
<body>

<div id="wrap">
  <div class="card">
    <img alt="Cabro City" src="/cabro-city-logo.png">
    <h2>Choose an app</h2>
    <p>Cabro City runs two separate apps. Pick which one you want to use — you can switch anytime from the menu.</p>
    <div class="mode-list" id="modeList">
      <div class="loading">Loading…</div>
    </div>
    <button class="logout-link" onclick="doLogout()">Log out instead</button>
  </div>
</div>

<script type="module">
import {
  watchAdmin, logoutAdmin, fetchOrBootstrapRole, canAccessPOS
} from "./firebase-config.js";

const modeListEl = document.getElementById("modeList");

window.doLogout = function(){
  logoutAdmin().then(()=> window.location.replace("index.html"));
};

function goPos(){
  sessionStorage.setItem("cabroAppMode", "pos");
  window.location.replace("cabro-pos/index.html");
}
window.goPos = goPos;

function goStores(){
  sessionStorage.setItem("cabroAppMode", "stores");
  window.location.replace("index.html");
}
window.goStores = goStores;

watchAdmin(async (user)=>{
  if(!user){
    window.location.replace("index.html");
    return;
  }

  let roleDoc;
  try{ roleDoc = await fetchOrBootstrapRole(user); }
  catch(e){ roleDoc = null; }

  if(!roleDoc){
    window.location.replace("index.html");
    return;
  }

  // Not actually granted POS access (e.g. it was revoked, or someone typed
  // this URL directly) — nothing to choose, just go straight into Stores.
  if(!canAccessPOS(roleDoc.role, roleDoc.posAccess)){
    goStores();
    return;
  }

  modeListEl.innerHTML = `
    <div class="mode-item" onclick="goPos()">
      <div class="mode-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
      </div>
      <div class="mode-info">
        <div class="mode-name">Point of Sale</div>
        <div class="mode-sub">Ring up sales — cash &amp; M-Pesa checkout</div>
      </div>
      <div class="mode-arrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </div>
    </div>
    <div class="mode-item" onclick="goStores()">
      <div class="mode-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l1-5h16l1 5"/><path d="M4 9h16v10a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9z"/><path d="M9 21v-6h6v6"/></svg>
      </div>
      <div class="mode-info">
        <div class="mode-name">Stores</div>
        <div class="mode-sub">Quarry inventory, receiving &amp; issuing</div>
      </div>
      <div class="mode-arrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </div>
    </div>
  `;
});
</script>
</body>
</html>
