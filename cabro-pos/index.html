<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cabro POS — Terminal</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0e0e10">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="icon" href="/icon-192.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff; --panel:#f6f6f8; --panel-alt:#eeeef1; --panel-raise:#ffffff;
    --line:#e2e2e6; --line-soft:#ececf0; --text:#151517; --text-dim:#68686f; --text-faint:#9a9aa2;
    --oxide:#f5590a; --oxide-dim:#b8420a; --green:#1a9e5c; --red:#e13a3a; --radius:10px;
  }
  *{box-sizing:border-box;}
  body{margin:0;}
  html,body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  h1,h2,h3,.disp{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:0.04em;margin:0;}

  /* topbar (shared look w/ main app) */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 16px;border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,#0e0e10,#0a0a0b);
    position:sticky;top:0;z-index:30;gap:10px;
  }
  .brand{display:flex;align-items:center;gap:10px;min-width:0;}
  .brand-mark{
    width:30px;height:30px;border:2px solid var(--oxide);border-radius:4px;
    display:flex;align-items:center;justify-content:center;color:var(--oxide);
    font-family:'Oswald',sans-serif;font-weight:700;font-size:13px;transform:rotate(45deg);flex-shrink:0;
  }
  .brand-mark span{transform:rotate(-45deg);}
  .brand-text{min-width:0;}
  .brand-text h1{font-size:15px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .brand-text .sub{font-size:10px;color:#8a8a92;letter-spacing:0.08em;margin-top:1px;}
  .topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
  .icon-btn{
    width:34px;height:34px;border-radius:8px;border:1px solid #26262a;background:#151517;
    color:#c9c9ce;display:flex;align-items:center;justify-content:center;cursor:pointer;
  }
  .icon-btn svg{width:17px;height:17px;}

  .tabs{display:flex;gap:2px;background:#0a0a0b;padding:0 12px;overflow-x:auto;}
  .tab-link{
    padding:11px 14px;font-size:12px;letter-spacing:0.04em;color:#8a8a92;text-decoration:none;
    white-space:nowrap;border-bottom:2px solid transparent;font-weight:600;
  }
  .tab-link.active{color:var(--oxide);border-bottom-color:var(--oxide);}

  .wrap{padding:14px 14px 100px;}

  .search-row{display:flex;gap:8px;margin-bottom:12px;}
  .search-box{
    flex:1;display:flex;align-items:center;gap:8px;background:var(--panel);
    border:1px solid var(--line);border-radius:100px;padding:9px 14px;
  }
  .search-box svg{width:16px;height:16px;color:var(--text-faint);flex-shrink:0;}
  .search-box input{border:none;background:none;outline:none;flex:1;font-size:13.5px;color:var(--text);font-family:'Inter',sans-serif;}

  .cat-row{display:flex;gap:8px;overflow-x:auto;margin-bottom:14px;padding-bottom:2px;}
  .cat-chip{
    flex-shrink:0;padding:7px 14px;border-radius:100px;border:1px solid var(--line);
    background:var(--panel-raise);font-size:11.5px;font-weight:600;color:var(--text-dim);cursor:pointer;white-space:nowrap;
  }
  .cat-chip.active{background:var(--oxide);border-color:var(--oxide);color:#fff;}

  .prod-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
  @media(min-width:560px){.prod-grid{grid-template-columns:repeat(3,1fr);}}
  @media(min-width:820px){.prod-grid{grid-template-columns:repeat(4,1fr);}}
  .prod-card{
    border:1px solid var(--line);border-radius:var(--radius);background:var(--panel-raise);
    padding:14px 12px;cursor:pointer;display:flex;flex-direction:column;gap:6px;
    transition:border-color .12s,transform .08s;
  }
  .prod-card:active{transform:scale(0.97);border-color:var(--oxide);}
  .prod-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.25;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:33px;}
  .prod-cat{font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.05em;}
  .prod-price{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;color:var(--oxide-dim);margin-top:auto;}

  .empty{padding:60px 16px;text-align:center;color:var(--text-dim);font-size:13px;}
  .empty a{color:var(--oxide);font-weight:600;text-decoration:none;}

  /* cart FAB */
  .cart-fab{
    position:fixed;left:14px;right:14px;bottom:14px;z-index:25;
    background:#151517;color:#fff;border-radius:14px;padding:14px 18px;
    display:flex;align-items:center;justify-content:space-between;
    box-shadow:0 8px 24px rgba(0,0,0,0.22);cursor:pointer;
  }
  .cart-fab.hidden{display:none;}
  .cart-fab-left{display:flex;align-items:center;gap:10px;}
  .cart-badge{
    width:24px;height:24px;border-radius:100px;background:var(--oxide);color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-family:'IBM Plex Mono',monospace;
  }
  .cart-fab-label{font-size:13px;font-weight:600;}
  .cart-fab-total{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:700;color:var(--oxide);}

  /* sheets / overlays */
  .sheet-overlay{
    position:fixed;inset:0;background:rgba(10,10,11,0.5);z-index:50;
    display:none;align-items:flex-end;justify-content:center;
  }
  .sheet-overlay.open{display:flex;}
  .sheet{
    background:#fff;width:100%;max-width:520px;border-radius:16px 16px 0 0;
    max-height:88vh;display:flex;flex-direction:column;
    animation:slideUp .18s ease-out;
  }
  @keyframes slideUp{from{transform:translateY(16px);opacity:0.6;}to{transform:translateY(0);opacity:1;}}
  .sheet-handle{width:36px;height:4px;border-radius:100px;background:var(--line);margin:10px auto 0;}
  .sheet-head{display:flex;align-items:center;justify-content:space-between;padding:12px 18px 6px;}
  .sheet-head h3{font-size:15px;}
  .sheet-close{border:none;background:none;color:var(--text-dim);font-size:20px;cursor:pointer;padding:4px;line-height:1;}
  .sheet-body{padding:6px 18px 18px;overflow-y:auto;}

  .cart-line{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--line-soft);}
  .cart-line:last-child{border-bottom:none;}
  .cl-info{flex:1;min-width:0;}
  .cl-name{font-size:13px;font-weight:600;color:var(--text);}
  .cl-price{font-size:11.5px;color:var(--text-faint);font-family:'IBM Plex Mono',monospace;margin-top:1px;}
  .qty-stepper{display:flex;align-items:center;gap:0;border:1px solid var(--line);border-radius:8px;overflow:hidden;flex-shrink:0;}
  .qty-stepper button{width:28px;height:28px;border:none;background:var(--panel);color:var(--text);font-size:15px;cursor:pointer;}
  .qty-stepper span{width:26px;text-align:center;font-size:12.5px;font-family:'IBM Plex Mono',monospace;}
  .cl-remove{border:none;background:none;color:var(--text-faint);cursor:pointer;padding:4px;font-size:13px;flex-shrink:0;}
  .cl-linetotal{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;width:70px;text-align:right;flex-shrink:0;}

  .cart-empty{padding:40px 0;text-align:center;color:var(--text-dim);font-size:13px;}

  .totals-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;color:var(--text-dim);}
  .totals-row.grand{font-size:16px;font-weight:700;color:var(--text);padding-top:10px;border-top:1px solid var(--line);margin-top:6px;}
  .totals-row.grand .mono{color:var(--oxide-dim);}

  .btn-primary{
    width:100%;padding:14px;border-radius:10px;border:none;background:var(--oxide);color:#fff;
    font-weight:700;font-size:14px;cursor:pointer;letter-spacing:0.02em;
  }
  .btn-primary:disabled{background:var(--line);color:var(--text-faint);cursor:not-allowed;}
  .btn-ghost{
    width:100%;padding:12px;border-radius:10px;border:1px solid var(--line);background:none;color:var(--text-dim);
    font-weight:600;font-size:13px;cursor:pointer;margin-top:8px;
  }

  /* checkout */
  .pay-tabs{display:flex;gap:8px;margin:6px 0 16px;}
  .pay-tab{
    flex:1;padding:12px 8px;border:1px solid var(--line);border-radius:10px;background:var(--panel-raise);
    text-align:center;cursor:pointer;font-size:12.5px;font-weight:700;color:var(--text-dim);
  }
  .pay-tab.active{border-color:var(--oxide);background:#fff6f1;color:var(--oxide-dim);}
  .pay-total-display{text-align:center;padding:10px 0 18px;}
  .pay-total-display .label{font-size:11px;color:var(--text-faint);letter-spacing:0.08em;text-transform:uppercase;}
  .pay-total-display .amount{font-family:'IBM Plex Mono',monospace;font-size:30px;font-weight:700;color:var(--text);margin-top:4px;}

  .field{margin-bottom:14px;}
  .field label{display:block;font-size:11.5px;color:var(--text-dim);margin-bottom:6px;font-weight:600;}
  .field input{
    width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:10px;
    font-size:15px;font-family:'IBM Plex Mono',monospace;outline:none;
  }
  .field input:focus{border-color:var(--oxide);}
  .quick-amounts{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px;}
  .quick-amt{padding:7px 12px;border:1px solid var(--line);border-radius:8px;background:var(--panel);font-size:12px;font-weight:600;cursor:pointer;color:var(--text-dim);}
  .change-row{display:flex;justify-content:space-between;padding:10px 0;font-size:14px;font-weight:700;}
  .change-row.negative .mono{color:var(--red);}
  .change-row .mono{color:var(--green);}

  /* receipt */
  .receipt{
    background:#fff;border:1px dashed var(--line);border-radius:6px;padding:18px 16px;
    font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text);
  }
  .receipt-head{text-align:center;margin-bottom:10px;}
  .receipt-head .rn{font-family:'Oswald',sans-serif;font-size:15px;text-transform:uppercase;letter-spacing:0.06em;}
  .receipt-head .rs{font-size:10px;color:var(--text-faint);margin-top:2px;}
  .receipt-divider{border-top:1px dashed var(--line);margin:9px 0;}
  .receipt-line{display:flex;justify-content:space-between;padding:2px 0;}
  .receipt-line .rl-name{flex:1;min-width:0;padding-right:6px;}
  .receipt-total{display:flex;justify-content:space-between;padding:5px 0;font-weight:700;font-size:13px;}
  .receipt-meta{font-size:10.5px;color:var(--text-dim);margin-top:8px;line-height:1.6;}

  .toast{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:#151517;color:#fff;padding:10px 18px;border-radius:100px;font-size:12.5px;
    z-index:80;display:none;box-shadow:0 6px 18px rgba(0,0,0,0.25);
  }
  .toast.show{display:block;}

  #gate{
    position:fixed;inset:0;background:#fff;z-index:100;display:flex;align-items:center;justify-content:center;
  }
  #gate .g{text-align:center;color:var(--text-dim);font-size:13px;}

  @media print{
    body *{visibility:hidden;}
    #printArea, #printArea *{visibility:visible;}
    #printArea{position:absolute;top:0;left:0;width:100%;}
  }
</style>
</head>
<body>

<div id="gate"><div class="g">Loading Cabro POS…</div></div>

<div class="topbar">
  <div class="brand">
    <div class="brand-mark"><span>C</span></div>
    <div class="brand-text">
      <h1>Cabro POS</h1>
      <div class="sub" id="cashierLabel">—</div>
    </div>
  </div>
  <div class="topbar-right">
    <button class="icon-btn" title="Switch to Stores" onclick="switchToStores()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 21l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
    </button>
    <button class="icon-btn" title="Log out" onclick="doLogout()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
    </button>
  </div>
</div>
<div class="tabs">
  <a class="tab-link active" href="index.html">Terminal</a>
  <a class="tab-link" href="sales.html">Sales History</a>
  <a class="tab-link" id="productsTabLink" href="products.html" style="display:none;">Products</a>
</div>

<div class="wrap">
  <div class="search-row">
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="searchInput" placeholder="Search products…" oninput="renderGrid()">
    </div>
  </div>
  <div class="cat-row" id="catRow" style="display:none;"></div>
  <div id="gridBox"><div class="empty">Loading products…</div></div>
</div>

<div class="cart-fab hidden" id="cartFab" onclick="openCart()">
  <div class="cart-fab-left">
    <div class="cart-badge" id="cartCount">0</div>
    <div class="cart-fab-label">View cart</div>
  </div>
  <div class="cart-fab-total mono" id="cartFabTotal">KES 0</div>
</div>

<!-- CART SHEET -->
<div class="sheet-overlay" id="cartOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-head"><h3>Cart</h3><button class="sheet-close" onclick="closeSheet('cartOverlay')">×</button></div>
    <div class="sheet-body">
      <div id="cartLines"></div>
      <div id="cartTotals" style="display:none;">
        <div class="totals-row grand"><span>Total</span><span class="mono" id="cartGrandTotal">KES 0</span></div>
      </div>
      <button class="btn-primary" id="checkoutBtn" style="margin-top:14px;" onclick="openCheckout()">Charge</button>
    </div>
  </div>
</div>

<!-- CHECKOUT SHEET -->
<div class="sheet-overlay" id="checkoutOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-head"><h3>Checkout</h3><button class="sheet-close" onclick="closeSheet('checkoutOverlay')">×</button></div>
    <div class="sheet-body">
      <div class="pay-tab-wrap">
        <div class="pay-tabs">
          <div class="pay-tab active" id="payTabCash" onclick="setPayMethod('cash')">💵 Cash</div>
          <div class="pay-tab" id="payTabMpesa" onclick="setPayMethod('mpesa')">📱 M-Pesa</div>
        </div>
      </div>
      <div class="pay-total-display">
        <div class="label">Amount Due</div>
        <div class="amount mono" id="payTotalAmount">KES 0</div>
      </div>

      <div id="cashFields">
        <div class="quick-amounts" id="quickAmounts"></div>
        <div class="field">
          <label>Amount tendered</label>
          <input type="number" id="tenderedInput" inputmode="numeric" placeholder="0" oninput="updateChange()">
        </div>
        <div class="change-row" id="changeRow"><span>Change due</span><span class="mono" id="changeAmount">KES 0</span></div>
      </div>

      <div id="mpesaFields" style="display:none;">
        <div class="field">
          <label>M-Pesa transaction code</label>
          <input type="text" id="mpesaRefInput" placeholder="e.g. QK7X8Y2A1B" style="text-transform:uppercase;">
        </div>
      </div>

      <div id="checkoutError" style="display:none;color:var(--red);font-size:12px;margin-bottom:10px;"></div>
      <button class="btn-primary" id="completeSaleBtn" onclick="completeSale()">Complete Sale</button>
    </div>
  </div>
</div>

<!-- RECEIPT SHEET -->
<div class="sheet-overlay" id="receiptOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-head"><h3>Sale Complete</h3><button class="sheet-close" onclick="closeReceiptAndReset()">×</button></div>
    <div class="sheet-body">
      <div id="printArea"><div class="receipt" id="receiptBox"></div></div>
      <button class="btn-primary" style="margin-top:14px;" onclick="window.print()">Print Receipt</button>
      <button class="btn-ghost" onclick="closeReceiptAndReset()">New Sale</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import {
  db, watchAdmin, logoutAdmin, fetchOrBootstrapRole, canAccessPOS, canManage,
  collection, addDoc, onSnapshot, serverTimestamp, query, where, orderBy, logAudit
} from "../firebase-config.js";

let myUid = "", myName = "", myRole = "";
let products = [];
let cart = []; // {productId, name, price, qty}
let activeCategory = "";
let payMethod = "cash";

function escapeHtml(str){
  if(str === null || str === undefined) return "";
  return String(str).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function money(n){
  const v = Math.round((n || 0) * 100) / 100;
  return "KES " + v.toLocaleString("en-KE", { minimumFractionDigits: v % 1 === 0 ? 0 : 2 });
}
function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2200);
}
window.switchToStores = function(){
  sessionStorage.setItem("cabroAppMode", "stores");
  window.location.href = "../index.html";
};
window.doLogout = function(){
  logoutAdmin().then(()=> window.location.replace("../index.html"));
};

/* ---------- Auth gate ---------- */
watchAdmin(async (user)=>{
  if(!user){ window.location.replace("../index.html"); return; }
  let roleDoc;
  try{ roleDoc = await fetchOrBootstrapRole(user); }
  catch(e){ roleDoc = null; }
  if(!roleDoc){ window.location.replace("../index.html"); return; }
  if(!canAccessPOS(roleDoc.role, roleDoc.posAccess)){
    // Not actually POS-allowed (e.g. access was revoked) — send back to Stores.
    window.location.replace("../index.html");
    return;
  }
  myUid = user.uid;
  myName = roleDoc.displayName || user.email;
  myRole = roleDoc.role;
  sessionStorage.setItem("cabroAppMode", "pos");
  document.getElementById("cashierLabel").textContent = myName;
  if(canManage(myRole)) document.getElementById("productsTabLink").style.display = "";
  document.getElementById("gate").style.display = "none";
  startProductListener();
});

/* ---------- Products ---------- */
function startProductListener(){
  const q = query(collection(db, "posProducts"), orderBy("name"));
  onSnapshot(q, (snap)=>{
    products = snap.docs.map(d=>({id:d.id, ...d.data()})).filter(p=>p.active !== false);
    renderCategories();
    renderGrid();
  }, (err)=>{
    document.getElementById("gridBox").innerHTML = `<div class="empty">Couldn't load products — ${escapeHtml(err.message)}</div>`;
  });
}
function renderCategories(){
  const cats = [...new Set(products.map(p=>p.category).filter(Boolean))];
  const row = document.getElementById("catRow");
  if(cats.length === 0){ row.style.display = "none"; return; }
  row.style.display = "flex";
  row.innerHTML = `<div class="cat-chip ${activeCategory===""?"active":""}" onclick="setCategory('')">All</div>` +
    cats.map(c=>`<div class="cat-chip ${activeCategory===c?"active":""}" onclick="setCategory('${escapeHtml(c).replace(/'/g,"\\'")}')">${escapeHtml(c)}</div>`).join("");
}
window.setCategory = function(c){ activeCategory = c; renderCategories(); renderGrid(); };
window.renderGrid = function(){
  const term = (document.getElementById("searchInput").value || "").toLowerCase().trim();
  let list = products;
  if(activeCategory) list = list.filter(p=>p.category === activeCategory);
  if(term) list = list.filter(p=>(p.name||"").toLowerCase().includes(term));
  const box = document.getElementById("gridBox");
  if(products.length === 0){
    box.innerHTML = `<div class="empty">No products yet.${canManage(myRole) ? ` <a href="products.html">Add your first product →</a>` : " Ask the owner to add products."}</div>`;
    return;
  }
  if(list.length === 0){ box.innerHTML = `<div class="empty">No products match.</div>`; return; }
  box.innerHTML = `<div class="prod-grid">` + list.map(p=>`
    <div class="prod-card" onclick="addToCart('${p.id}')">
      <div class="prod-name">${escapeHtml(p.name)}</div>
      ${p.category ? `<div class="prod-cat">${escapeHtml(p.category)}</div>` : ""}
      <div class="prod-price mono">${money(p.price)}</div>
    </div>
  `).join("") + `</div>`;
};

/* ---------- Cart ---------- */
window.addToCart = function(productId){
  const p = products.find(x=>x.id === productId);
  if(!p) return;
  const line = cart.find(l=>l.productId === productId);
  if(line) line.qty += 1;
  else cart.push({ productId: p.id, name: p.name, price: p.price, qty: 1 });
  renderCart();
  showToast(p.name + " added");
};
function cartTotal(){ return cart.reduce((s,l)=>s + l.price*l.qty, 0); }
function cartCount(){ return cart.reduce((s,l)=>s + l.qty, 0); }
window.changeQty = function(productId, delta){
  const line = cart.find(l=>l.productId === productId);
  if(!line) return;
  line.qty += delta;
  if(line.qty <= 0) cart = cart.filter(l=>l.productId !== productId);
  renderCart();
};
window.removeLine = function(productId){
  cart = cart.filter(l=>l.productId !== productId);
  renderCart();
};
function renderCart(){
  const fab = document.getElementById("cartFab");
  const count = cartCount();
  if(count === 0){ fab.classList.add("hidden"); }
  else{
    fab.classList.remove("hidden");
    document.getElementById("cartCount").textContent = count;
    document.getElementById("cartFabTotal").textContent = money(cartTotal());
  }
  const linesBox = document.getElementById("cartLines");
  const totalsBox = document.getElementById("cartTotals");
  const checkoutBtn = document.getElementById("checkoutBtn");
  if(cart.length === 0){
    linesBox.innerHTML = `<div class="cart-empty">Cart is empty — tap a product to add it.</div>`;
    totalsBox.style.display = "none";
    checkoutBtn.disabled = true;
    return;
  }
  totalsBox.style.display = "block";
  checkoutBtn.disabled = false;
  linesBox.innerHTML = cart.map(l=>`
    <div class="cart-line">
      <div class="cl-info">
        <div class="cl-name">${escapeHtml(l.name)}</div>
        <div class="cl-price">${money(l.price)} each</div>
      </div>
      <div class="qty-stepper">
        <button onclick="changeQty('${l.productId}', -1)">−</button>
        <span>${l.qty}</span>
        <button onclick="changeQty('${l.productId}', 1)">+</button>
      </div>
      <div class="cl-linetotal mono">${money(l.price * l.qty)}</div>
      <button class="cl-remove" onclick="removeLine('${l.productId}')">✕</button>
    </div>
  `).join("");
  document.getElementById("cartGrandTotal").textContent = money(cartTotal());
}
window.openCart = function(){ document.getElementById("cartOverlay").classList.add("open"); };
window.closeSheet = function(id){ document.getElementById(id).classList.remove("open"); };

/* ---------- Checkout ---------- */
window.openCheckout = function(){
  if(cart.length === 0) return;
  document.getElementById("cartOverlay").classList.remove("open");
  setPayMethod("cash");
  document.getElementById("tenderedInput").value = "";
  document.getElementById("mpesaRefInput").value = "";
  document.getElementById("checkoutError").style.display = "none";
  const total = cartTotal();
  document.getElementById("payTotalAmount").textContent = money(total);
  const rounded = Math.ceil(total / 50) * 50;
  const suggestions = [...new Set([total, rounded, rounded + 50, rounded + 100])];
  document.getElementById("quickAmounts").innerHTML = suggestions.map(a=>
    `<div class="quick-amt" onclick="setTendered(${a})">${money(a)}</div>`
  ).join("");
  updateChange();
  document.getElementById("checkoutOverlay").classList.add("open");
};
window.setTendered = function(a){
  document.getElementById("tenderedInput").value = a;
  updateChange();
};
window.updateChange = function(){
  const total = cartTotal();
  const tendered = parseFloat(document.getElementById("tenderedInput").value) || 0;
  const change = tendered - total;
  const row = document.getElementById("changeRow");
  row.classList.toggle("negative", change < 0);
  document.getElementById("changeAmount").textContent = money(Math.abs(change));
  row.querySelector("span:first-child").textContent = change < 0 ? "Amount short" : "Change due";
};
window.setPayMethod = function(method){
  payMethod = method;
  document.getElementById("payTabCash").classList.toggle("active", method === "cash");
  document.getElementById("payTabMpesa").classList.toggle("active", method === "mpesa");
  document.getElementById("cashFields").style.display = method === "cash" ? "block" : "none";
  document.getElementById("mpesaFields").style.display = method === "mpesa" ? "block" : "none";
};

let lastSale = null;
window.completeSale = async function(){
  const errBox = document.getElementById("checkoutError");
  errBox.style.display = "none";
  const total = cartTotal();
  let saleData = {
    items: cart.map(l=>({ productId: l.productId, name: l.name, price: l.price, qty: l.qty, lineTotal: Math.round(l.price*l.qty*100)/100 })),
    subtotal: Math.round(total*100)/100,
    total: Math.round(total*100)/100,
    paymentMethod: payMethod,
    cashierUid: myUid, cashierName: myName,
    createdAt: serverTimestamp(), status: "completed"
  };
  if(payMethod === "cash"){
    const tendered = parseFloat(document.getElementById("tenderedInput").value) || 0;
    if(tendered < total){ errBox.textContent = "Amount tendered is less than the total due."; errBox.style.display = "block"; return; }
    saleData.amountTendered = tendered;
    saleData.change = Math.round((tendered - total)*100)/100;
  } else {
    const ref = document.getElementById("mpesaRefInput").value.trim().toUpperCase();
    if(!ref){ errBox.textContent = "Enter the M-Pesa transaction code."; errBox.style.display = "block"; return; }
    saleData.mpesaRef = ref;
  }
  const btn = document.getElementById("completeSaleBtn");
  btn.disabled = true; btn.textContent = "Processing…";
  try{
    const ref = await addDoc(collection(db, "posSales"), saleData);
    logAudit({
      actorUid: myUid, actorName: myName, actorRole: myRole,
      action: "pos.sale", entityType: "posSale", entityId: ref.id, entityLabel: money(total),
      summary: `POS sale of ${money(total)} via ${payMethod === "cash" ? "cash" : "M-Pesa"}`,
      meta: { total, paymentMethod: payMethod }
    });
    lastSale = { ...saleData, createdAt: new Date(), id: ref.id };
    document.getElementById("checkoutOverlay").classList.remove("open");
    renderReceipt(lastSale);
    document.getElementById("receiptOverlay").classList.add("open");
  }catch(e){
    errBox.textContent = "Couldn't complete sale: " + e.message;
    errBox.style.display = "block";
  }finally{
    btn.disabled = false; btn.textContent = "Complete Sale";
  }
};
function renderReceipt(sale){
  const dt = sale.createdAt instanceof Date ? sale.createdAt : new Date();
  const box = document.getElementById("receiptBox");
  box.innerHTML = `
    <div class="receipt-head">
      <div class="rn">Cabro POS</div>
      <div class="rs">${dt.toLocaleString("en-KE")}</div>
    </div>
    <div class="receipt-divider"></div>
    ${sale.items.map(i=>`
      <div class="receipt-line"><span class="rl-name">${escapeHtml(i.name)} ×${i.qty}</span><span>${money(i.lineTotal)}</span></div>
    `).join("")}
    <div class="receipt-divider"></div>
    <div class="receipt-total"><span>TOTAL</span><span>${money(sale.total)}</span></div>
    ${sale.paymentMethod === "cash" ? `
      <div class="receipt-line"><span class="rl-name">Cash tendered</span><span>${money(sale.amountTendered)}</span></div>
      <div class="receipt-line"><span class="rl-name">Change</span><span>${money(sale.change)}</span></div>
    ` : `
      <div class="receipt-line"><span class="rl-name">M-Pesa ref</span><span>${escapeHtml(sale.mpesaRef)}</span></div>
    `}
    <div class="receipt-meta">
      Served by ${escapeHtml(sale.cashierName)}<br>
      Sale #${sale.id.slice(0,8).toUpperCase()}
    </div>
  `;
}
window.closeReceiptAndReset = function(){
  document.getElementById("receiptOverlay").classList.remove("open");
  cart = [];
  renderCart();
};
</script>
</body>
</html>
