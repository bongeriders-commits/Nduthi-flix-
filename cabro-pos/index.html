<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katani Quarry — Stores</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#f5590a">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="icon" href="/icon-192.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
  :root{
    --bg:#ffffff;
    --panel:#f6f6f8;
    --panel-alt:#eeeef1;
    --panel-raise:#ffffff;
    --line:#e2e2e6;
    --line-soft:#ececf0;
    --text:#151517;
    --text-dim:#68686f;
    --text-faint:#9a9aa2;
    --oxide:#f5590a;
    --oxide-dim:#b8420a;
    --amber:#b45309;
    --red:#e13a3a;
    --green:#f5590a;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{margin:0;}
  html,body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:'IBM Plex Mono',monospace;}
  h1,h2,h3,.disp{
    font-family:'Oswald',sans-serif;
    text-transform:uppercase;
    letter-spacing:0.04em;
    margin:0;
  }

  /* ===== Top bar ===== */
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:16px 28px;
    border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,#0e0e10,#0a0a0b);
    position:sticky;
    top:0;
    z-index:20;
  }
  .brand{display:flex;align-items:center;gap:12px;}
  .brand-mark{
    width:34px;height:34px;
    border:2px solid var(--oxide);
    border-radius:4px;
    display:flex;align-items:center;justify-content:center;
    color:var(--oxide);
    font-family:'Oswald',sans-serif;
    font-weight:700;
    font-size:15px;
    transform:rotate(45deg);
  }
  .brand-mark span{transform:rotate(-45deg);}
  .brand-text h1{font-size:18px;color:var(--text);}
  .brand-text .sub{font-size:11px;color:var(--text-faint);letter-spacing:0.08em;margin-top:2px;}
  .topbar-right{display:flex;align-items:center;gap:18px;}
  .sync-pill{
    display:flex;align-items:center;gap:7px;
    font-size:11px;letter-spacing:0.05em;
    color:var(--text-dim);
    border:1px solid var(--line);
    padding:6px 12px;
    border-radius:100px;
    background:var(--panel);
  }
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);}
  .clerk{font-size:12px;color:var(--text-dim);}
  .clerk b{color:var(--text);font-weight:600;}

  .wrap{padding:16px 16px 24px;}

  /* ===== Gauge cluster ===== */
  .cluster{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:1px;
    background:var(--line);
    border:1px solid var(--line);
    border-radius:var(--radius);
    overflow:hidden;
    margin-bottom:28px;
  }
  .gauge-card{
    background:var(--panel);
    padding:20px 18px 16px;
    display:flex;
    flex-direction:column;
    align-items:center;
    position:relative;
  }
  .gauge-card .label{
    font-family:'Oswald',sans-serif;
    font-size:12px;
    letter-spacing:0.12em;
    color:var(--text-dim);
    margin-top:2px;
  }
  .gauge-svg{width:132px;height:78px;}
  .gauge-value{
    font-family:'IBM Plex Mono',monospace;
    font-size:22px;
    font-weight:600;
    margin-top:-30px;
    color:var(--text);
  }
  .gauge-value small{font-size:11px;color:var(--text-faint);font-weight:400;margin-left:2px;}

  /* ===== Reports: single enlarged, centered fuel gauge ===== */
  .fuel-gauge-wrap{display:flex;justify-content:center;margin-bottom:16px;}
  .gauge-card-lg{
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:34px 56px 28px;width:100%;max-width:360px;
  }
  .gauge-card-lg .gauge-svg{width:100%;height:auto;max-width:280px;}
  .gauge-card-lg .gauge-value{font-size:36px;margin-top:-50px;}
  .gauge-card-lg .label{font-size:14px;letter-spacing:0.14em;margin-top:8px;}
  .reports-stats-row{display:flex;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;margin-bottom:20px;}
  .reports-stats-row .flag-card{flex:1;}

  .flag-card{
    background:var(--panel);
    padding:20px 18px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:flex-start;
    gap:6px;
  }
  .flag-count{
    font-family:'IBM Plex Mono',monospace;
    font-size:34px;
    font-weight:600;
    color:var(--red);
    line-height:1;
  }
  .flag-card .label{font-size:12px;letter-spacing:0.1em;color:var(--text-dim);font-family:'Oswald',sans-serif;}
  .flag-card .hint{font-size:11px;color:var(--text-faint);}

  /* ===== Toolbar ===== */
  .toolbar{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:16px;
    flex-wrap:wrap;
  }
  .search{
    flex:1;
    min-width:200px;
    position:relative;
  }
  .search input{
    width:100%;
    background:var(--panel);
    border:1px solid var(--line);
    color:var(--text);
    padding:10px 14px 10px 34px;
    border-radius:8px;
    font-size:13px;
    font-family:'Inter',sans-serif;
  }
  .search input::placeholder{color:var(--text-faint);}
  .search input:focus{outline:2px solid var(--oxide);outline-offset:-1px;}
  .search::before{
    content:"";
    position:absolute;left:12px;top:50%;transform:translateY(-50%);
    width:13px;height:13px;
    border:1.5px solid var(--text-faint);
    border-radius:50%;
  }
  .search::after{
    content:"";
    position:absolute;left:21px;top:16px;
    width:6px;height:1.5px;
    background:var(--text-faint);
    transform:rotate(45deg);
  }
  .chips{display:flex;gap:6px;}
  .chip{
    padding:8px 14px;
    border:1px solid var(--line);
    border-radius:100px;
    font-size:12px;
    letter-spacing:0.03em;
    color:var(--text-dim);
    background:var(--panel);
    cursor:pointer;
    font-family:'Inter',sans-serif;
    white-space:nowrap;
  }
  .chip.active{background:var(--oxide);border-color:var(--oxide);color:#ffffff;font-weight:600;}
  .chip:hover:not(.active){border-color:var(--text-faint);}
  .btn-log{
    background:var(--oxide);
    color:#ffffff;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    font-family:'Oswald',sans-serif;
    font-size:13px;
    letter-spacing:0.05em;
    text-transform:uppercase;
    font-weight:600;
    cursor:pointer;
    display:flex;align-items:center;gap:8px;
  }
  .btn-log:hover{background:#ff7a2e;}

  /* ===== Main grid ===== */
  .main-grid{
    display:grid;
    grid-template-columns:1fr 320px;
    gap:20px;
    align-items:start;
  }
  .panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    overflow:hidden;
  }
  .panel-head{
    padding:14px 18px;
    border-bottom:1px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .panel-head h2{font-size:13px;color:var(--text-dim);letter-spacing:0.1em;}
  .panel-head .count{font-size:11px;color:var(--text-faint);font-family:'IBM Plex Mono',monospace;}

  table{width:100%;border-collapse:collapse;}
  thead th{
    text-align:left;
    font-family:'Oswald',sans-serif;
    font-size:10.5px;
    letter-spacing:0.09em;
    color:var(--text-faint);
    padding:10px 14px;
    border-bottom:1px solid var(--line);
    background:var(--panel-alt);
    font-weight:500;
  }
  tbody td{
    padding:12px 14px;
    font-size:13px;
    border-bottom:1px solid var(--line-soft);
    color:var(--text);
    vertical-align:middle;
  }
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:var(--panel-alt);}
  .item-name{font-weight:600;}
  .item-cat{font-size:11px;color:var(--text-faint);margin-top:2px;}
  .bal{font-family:'IBM Plex Mono',monospace;font-size:14px;}
  .bal small{color:var(--text-faint);font-size:10.5px;}
  .badge{
    display:inline-flex;align-items:center;gap:5px;
    padding:4px 10px;
    border-radius:100px;
    font-size:10.5px;
    letter-spacing:0.06em;
    font-family:'Oswald',sans-serif;
    text-transform:uppercase;
    font-weight:600;
  }
  .badge::before{content:"";width:6px;height:6px;border-radius:50%;}
  .badge.ok{color:var(--green);background:rgba(245,89,10,0.14);}
  .badge.ok::before{background:var(--green);}
  .badge.low{color:var(--amber);background:rgba(180,83,9,0.10);}
  .badge.low::before{background:var(--amber);}
  .badge.critical{color:var(--red);background:rgba(225,58,58,0.14);}
  .badge.critical::before{background:var(--red);box-shadow:0 0 5px var(--red);}
  .row-flag{
    font-size:10px;color:var(--red);letter-spacing:0.04em;
    margin-top:3px;
  }
  .last-move{font-size:11.5px;color:var(--text-dim);}
  .last-move .who{color:var(--text-faint);}

  /* Activity feed */
  .feed{padding:6px 0;max-height:640px;overflow-y:auto;}
  .feed-item{
    padding:12px 18px;
    border-bottom:1px solid var(--line-soft);
    font-size:12.5px;
  }
  .feed-item:last-child{border-bottom:none;}
  .feed-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px;}
  .feed-type{
    font-family:'Oswald',sans-serif;
    font-size:10px;
    letter-spacing:0.08em;
    font-weight:600;
    text-transform:uppercase;
  }
  .feed-type.in{color:var(--green);}
  .feed-type.out{color:var(--amber);}
  .feed-type.adj{color:var(--red);}
  .feed-time{font-size:10px;color:var(--text-faint);font-family:'IBM Plex Mono',monospace;}
  .feed-desc{color:var(--text);line-height:1.4;}
  .feed-desc b{font-weight:600;}
  .feed-meta{color:var(--text-faint);font-size:11px;margin-top:2px;}

  /* ===== Modal ===== */
  .overlay{
    position:fixed;inset:0;
    background:rgba(10,10,11,0.72);
    display:none;
    align-items:center;justify-content:center;
    z-index:100;
    padding:20px;
  }
  .overlay.open{display:flex;}
  .modal{
    background:var(--panel-raise);
    border:1px solid var(--line);
    border-radius:12px;
    width:100%;
    max-width:460px;
    padding:22px 22px 20px;
  }
  .modal h3{font-size:15px;margin-bottom:16px;color:var(--text);}
  .type-toggle{display:flex;gap:8px;margin-bottom:16px;}
  .type-toggle button{
    flex:1;
    padding:10px;
    border-radius:8px;
    border:1px solid var(--line);
    background:var(--panel);
    color:var(--text-dim);
    font-family:'Oswald',sans-serif;
    font-size:12px;
    letter-spacing:0.06em;
    cursor:pointer;
  }
  .type-toggle button.active.in{background:rgba(245,89,10,0.15);border-color:var(--green);color:var(--green);}
  .type-toggle button.active.out{background:rgba(180,83,9,0.12);border-color:var(--amber);color:var(--amber);}
  .field{margin-bottom:13px;}
  .field label{
    display:block;font-size:11px;color:var(--text-dim);
    letter-spacing:0.05em;margin-bottom:6px;
    font-family:'Oswald',sans-serif;
  }
  .field select,.field input,.field textarea{
    width:100%;
    background:var(--panel);
    border:1px solid var(--line);
    color:var(--text);
    padding:10px 12px;
    border-radius:7px;
    font-size:13px;
    font-family:'Inter',sans-serif;
  }
  .field textarea{resize:vertical;min-height:56px;}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .modal-actions{display:flex;gap:10px;margin-top:18px;}
  .btn-cancel{
    flex:1;padding:11px;border-radius:8px;border:1px solid var(--line);
    background:transparent;color:var(--text-dim);font-family:'Oswald',sans-serif;
    font-size:12.5px;letter-spacing:0.05em;text-transform:uppercase;cursor:pointer;
  }
  .btn-submit{
    flex:2;padding:11px;border-radius:8px;border:none;
    background:var(--oxide);color:#ffffff;font-family:'Oswald',sans-serif;
    font-size:12.5px;letter-spacing:0.05em;text-transform:uppercase;font-weight:600;cursor:pointer;
  }
  .btn-submit:hover{background:#ff7a2e;}

  /* ===== Stock Count modal ===== */
  .sc-search-list{display:flex;flex-direction:column;gap:6px;max-height:280px;overflow-y:auto;margin-top:2px;}
  .sc-search-item{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:10px 12px;border:1px solid var(--line);border-radius:8px;
    cursor:pointer;background:var(--panel);
  }
  .sc-search-item:hover{border-color:var(--oxide);}
  .sc-si-name{font-size:13px;font-weight:600;color:var(--text);}
  .sc-si-cat{font-size:11px;color:var(--text-faint);}
  .sc-si-balance{font-size:12px;color:var(--text-dim);white-space:nowrap;}
  .sc-empty{font-size:12.5px;color:var(--text-faint);padding:10px 2px;}
  .sc-back{
    background:none;border:none;color:var(--text-faint);font-size:11.5px;
    letter-spacing:0.04em;cursor:pointer;padding:0;margin-bottom:14px;
    display:flex;align-items:center;gap:5px;font-family:'Oswald',sans-serif;
  }
  .sc-pill{display:inline-flex;align-items:center;padding:5px 12px;border-radius:100px;font-size:11.5px;font-weight:700;margin-bottom:16px;}
  .sc-pill.active{background:#dcfce7;color:#16a34a;}
  .sc-pill.low{background:#ffe6d3;color:var(--oxide-dim);}
  .sc-pill.out{background:#fde2e2;color:var(--red);}
  .sc-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 0;border-bottom:1px solid var(--line-soft);}
  .sc-row:last-of-type{border-bottom:none;}
  .sc-label{font-size:12px;color:var(--text-faint);}
  .sc-value{font-size:13px;font-weight:600;color:var(--text);text-align:right;}

  /* ===== App shell ===== */
  body{background:#ffffff;}
  .app-shell{
    max-width:480px;margin:0 auto;min-height:100vh;
    background:var(--bg);position:relative;
    padding-bottom:90px;
    border-left:1px solid var(--line);border-right:1px solid var(--line);
  }

  /* ===== Mobile header ===== */
  .mobile-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 18px;border-bottom:1px solid var(--line);
    position:sticky;top:0;background:#ffffff;z-index:30;
  }
  .mh-left{display:flex;align-items:center;gap:14px;}
  .hamburger{width:22px;height:15px;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer;background:none;border:none;padding:0;}
  .hamburger span{display:block;height:2.5px;background:#1a1a1d;border-radius:2px;}

  .mh-logo{display:flex;align-items:center;gap:10px;}
  .brand-logo-img{height:36px;width:auto;display:block;}

  .mh-right{display:flex;align-items:center;gap:18px;}
  .bell{position:relative;width:23px;height:23px;color:#68686f;background:none;border:none;padding:0;cursor:pointer;}
  .bell svg{width:100%;height:100%;}
  .bell .badge-dot{position:absolute;top:-6px;right:-8px;background:#ff7a1f;color:#fff;font-size:10px;font-weight:700;min-width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;padding:0 3px;font-family:'IBM Plex Mono',monospace;box-shadow:0 0 0 2px #ffffff;}
  .avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#3a3a40,#1c1c1f);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;position:relative;font-family:'Oswald',sans-serif;flex-shrink:0;border:1.5px solid #3a3a40;}
  .avatar .dot{position:absolute;bottom:0;right:0;width:10px;height:10px;border-radius:50%;background:#ff7a1f;border:2px solid #ffffff;}

  /* ===== Greeting ===== */
  .greeting-row{display:flex;justify-content:space-between;align-items:flex-start;padding:18px 16px 4px;gap:10px;}
  .greeting h2{font-family:'Inter',sans-serif;text-transform:none;font-size:18px;font-weight:700;color:var(--text);letter-spacing:0;}
  .greeting h2 b{color:var(--oxide);font-weight:700;}
  .greeting p{margin:4px 0 0;font-size:12px;color:var(--text-dim);}
  .date-pill{display:flex;align-items:center;gap:6px;border:1px solid var(--line);background:var(--panel);padding:8px 11px;border-radius:9px;font-size:11px;color:var(--text-dim);white-space:nowrap;font-family:'IBM Plex Mono',monospace;flex-shrink:0;}
  .date-pill svg{width:14px;height:14px;color:var(--oxide);}

  /* ===== Stat grid ===== */
  .stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:16px;}
  .stat-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;}
  .stat-card .s-icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;}
  .stat-card .s-icon svg{width:17px;height:17px;}
  .s-icon.blue{background:rgba(245,89,10,0.16);color:var(--oxide);}
  .s-icon.amber{background:rgba(180,83,9,0.12);color:var(--amber);}
  .s-icon.green{background:rgba(245,89,10,0.16);color:var(--oxide);}
  .s-icon.red{background:rgba(225,58,58,0.16);color:var(--red);}
  .stat-card .s-label{font-family:'Oswald',sans-serif;font-size:9.5px;letter-spacing:0.09em;color:var(--text-faint);margin-bottom:6px;}
  .stat-card .s-value{font-family:'IBM Plex Mono',monospace;font-size:19px;font-weight:600;color:var(--text);line-height:1;}
  .stat-card .s-sub{font-size:10.5px;margin-top:5px;}
  .stat-card .s-sub.up{color:var(--green);}
  .stat-card .s-sub.down{color:var(--red);}
  .stat-card .s-sub.warn{color:var(--amber);}
  .stat-card .s-sub.crit{color:var(--red);}
  .stat-card .s-sub.neutral{color:var(--text-faint);}
  .stat-card.ring-card{display:flex;flex-direction:column;align-items:center;text-align:center;}
  .ring-wrap{position:relative;width:58px;height:58px;margin:2px 0 8px;}
  .ring-wrap svg{width:100%;height:100%;transform:rotate(-90deg);}
  .ring-val{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:13px;color:var(--text);}

  /* ===== Section panel (quick actions / alerts / activity) ===== */
  .dash-section{margin:0 16px 16px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;}
  .dash-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
  .dash-head h3{font-family:'Inter',sans-serif;font-size:13.5px;font-weight:700;color:var(--text);text-transform:none;letter-spacing:0;}
  .dash-head a{font-size:11.5px;color:var(--oxide);cursor:pointer;background:none;border:none;font-family:'Inter',sans-serif;}

  .qa-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
  .qa-item{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;background:none;border:none;font-family:'Inter',sans-serif;padding:0;}
  .qa-icon{width:42px;height:42px;border-radius:12px;background:var(--panel-alt);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;}
  .qa-icon svg{width:19px;height:19px;}
  .qa-item span{font-size:9.5px;text-align:center;line-height:1.2;color:var(--text-dim);}

  .alert-item{display:flex;align-items:center;gap:11px;padding:11px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;background:var(--panel-alt);cursor:pointer;}
  .alert-item:last-child{margin-bottom:0;}
  .alert-item.crit{border-color:rgba(225,58,58,0.35);}
  .alert-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .alert-icon svg{width:16px;height:16px;}
  .alert-body{flex:1;min-width:0;}
  .alert-title{font-size:12px;font-weight:600;}
  .alert-title.red{color:var(--red);}
  .alert-title.blue{color:var(--oxide);}
